name: queee_calculator
description: "AI驱动的个性化计算器 - 用自然语言定制你的专属计算器"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  cupertino_icons: ^1.0.8
  provider: ^6.0.3
  shared_preferences: ^2.0.15
  math_expressions: ^3.0.0
  audioplayers: ^6.0.0
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.0.3
  image_picker: ^1.1.2
  path_provider: ^2.0.11
  path: ^1.8.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/sounds/cyberpunk/
    - assets/sounds/minimal/
    - assets/sounds/nature/
    - assets/themes/

